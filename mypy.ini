[mypy]
# Type-checking for the test suite. `follow_imports = silent` keeps the focus on
# the tests themselves: errors in followed app modules (e.g. app/factory.py) and
# untyped third-party libs (testcontainers, flask_compress, flask_migrate) don't
# fail `mypy tests/`.
files = tests
ignore_missing_imports = True
follow_imports = silent
