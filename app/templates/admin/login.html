{% extends "admin/_base_admin.html" %}
{% block title %}Ingresar — Admin · Juana María{% endblock %}

{% block body %}
<h1>Panel de administración</h1>
{% if error %}<p class="admin__error">{{ error }}</p>{% endif %}
<form method="post" action="{{ url_for('admin_login') }}" class="admin__form">
  <input type="hidden" name="next" value="{{ next }}" />
  <label for="password">Contraseña</label>
  <input
    id="password"
    name="password"
    type="password"
    autocomplete="current-password"
    autofocus
    required />
  <button type="submit">Ingresar</button>
</form>
{% endblock %}
